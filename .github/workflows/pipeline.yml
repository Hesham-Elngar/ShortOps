name: Full CI-CD Pipeline

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run CI/CD on'
        required: false
        default: ''
  push:
    branches:
      - dev/test
      - staging
      - prod
  pull_request:
    branches:
      - main
      - prod

jobs:

  ci-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Determine branch
        id: vars
        run: |
          # Use input branch if workflow_dispatch, otherwise use github.ref
          BRANCH="${{ github.event.inputs.branch }}"
          if [ -z "$BRANCH" ]; then
            BRANCH="${GITHUB_REF#refs/heads/}"
          fi
          echo "branch=$BRANCH" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: pytest

      - name: Run flake8 lint
        working-directory: backend
        run: |
          pip install flake8
          flake8 .

      - name: Print current branch
        run: echo ${{ env.branch }} 

  deploy:
    runs-on: ubuntu-latest
    needs: ci-checks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.branch }}

      - name: Deploy based on branch
        run: |
          echo "Deploying branch: ${{ env.branch }}"

          if [[ "${{ env.branch }}" == "dev/test" ]]; then
            echo "✅ Dev/Test deploy: Validate docker-compose"
            docker compose -f docker-compose.yml config

          elif [[ "${{ env.branch }}" == "staging" ]]; then
            echo "✅ Staging deploy: Minikube + Kubernetes manifests"
            # ... kubectl and minikube steps ...

          elif [[ "${{ env.branch }}" == "prod" ]]; then
            echo "✅ Production deploy: ArgoCD GitOps"
            # ... ArgoCD steps ...

          else
            echo "⚠️ Branch not configured for deploy. Skipping."
