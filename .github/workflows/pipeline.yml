name: Full CI/CD Based on Environment

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - staging
      - prod
      - main
  pull_request:
    branches:
      - prod
      - main 

env:
  AWS_REGION: ${{ variables.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest    
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::${AWS_ACCOUNT_ID}:role/ecrAccessRole
          aws-region: $AWS_REGION

      - name: Get image version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST_TAG#v}"
          PATCH=$((PATCH + 1))
          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${AWS_REGION} | \
          docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

      - name: Build & Push Backend
        run: |
          BACKEND_ECR=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/url-shortener-backend
          docker build --cache-from $BACKEND_ECR -t $BACKEND_ECR:${NEW_TAG} ./backend
          docker tag $BACKEND_ECR:${NEW_TAG} $BACKEND_ECR:latest
          docker push $BACKEND_ECR:${NEW_TAG}
          docker push $BACKEND_ECR:latest

      - name: Build & Push Frontend
        run: |
          FRONTEND_ECR=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/url-shortener-frontend
          docker build --cache-from $FRONTEND_ECR -t $FRONTEND_ECR:${NEW_TAG} ./frontend
          docker tag $FRONTEND_ECR:${NEW_TAG} -t $FRONTEND_ECR:latest
          docker push $FRONTEND_ECR:${NEW_TAG}
          docker push $FRONTEND_ECR:latest

      - name: Deploy based on branch
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/dev" ]]; then
            echo "✅ Dev deploy: EC2 docker-compose"
            ssh -i ${{ secrets.DEV_EC2_SSH_KEY }} ec2-user@${{ secrets.DEV_EC2_HOST }} << 'EOF'
              cd /home/ec2-user/url-shortener
              echo "${{ secrets.DOCKER_COMPOSE_YML }}" > docker-compose.yml
              echo "${{ secrets.DOT_ENV }}" > .env
              docker-compose pull
              docker-compose up -d --remove-orphans
            EOF

          elif [[ "$GITHUB_REF" == "refs/heads/staging" ]]; then
            echo "✅ Staging deploy: Helm + EKS"
            aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region $AWS_REGION
            kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -
            helm upgrade --install url-shortener ./helm -f ./helm/values.yaml -n staging

          elif [[ "$GITHUB_REF" == "refs/heads/main" || "$GITHUB_REF" == "refs/heads/prod" ]]; then
            echo "✅ Production deploy: ArgoCD + Helm + EKS"
            argocd login ${{ secrets.ARGOCD_SERVER }} \
              --username ${{ secrets.ARGOCD_USERNAME }} \
              --password ${{ secrets.ARGOCD_PASSWORD }} \
              --insecure
            argocd app sync url-shortener
            argocd app wait url-shortener

          else
            echo "⚠️ Branch not configured for deploy. Skipping."
