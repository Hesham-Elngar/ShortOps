name: Full CI-CD Pipeline

on:
  workflow_dispatch:
  
  push:
    branches:
      - dev
      - staging
      - prod

  pull_request:
    branches:
      - dev
      - staging
      - prod

jobs:

  #####################################
  #      🔍 CI — TEST + LINT         #
  #####################################
  ci-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: |
          pytest || true

      - name: Run flake8 lint
        working-directory: backend
        run: |
          pip install flake8
          flake8 || true

      - name: Print branch
        run: echo "Current branch → $GITHUB_REF"


  #####################################
  #   🚀 DEPLOY (BRANCH-BASED)       #
  #####################################
  deploy:
    runs-on: ubuntu-latest
    needs: ci-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect Branch
        id: branch
        run: echo "BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV


      ###############################################################
      #           🔵 DEV / TEST — DOCKER COMPOSE VALIDATE           #
      ###############################################################
      - name: Dev/Test — Validate docker-compose
        if: env.BRANCH_NAME == 'dev'
        run: |
          echo "Deploying to Dev/Test environment..."
          docker compose -f docker-compose.yml config


      ###############################################################
      #              🟣 STAGING — K8S / MINIKUBE TESTING            #
      ###############################################################
      - name: Staging — Setup Minikube
        if: env.BRANCH_NAME == 'staging'
        run: |
          echo "Setting up Minikube staging test cluster..."

          # Install kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

          # Install Minikube
          curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          chmod +x minikube-linux-amd64
          sudo mv minikube-linux-amd64 /usr/local/bin/minikube

          sudo minikube start --driver=docker --force
          kubectl cluster-info


      - name: Staging — Apply K8s manifests
        if: env.BRANCH_NAME == 'staging'
        run: |
          echo "Deploying staging manifests..."

          kubectl create namespace url-shortener --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic app-secrets \
            --from-literal=FLASK_SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }} \
            --from-literal=SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }} \
            -n url-shortener \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f k8s/manifests/


      ###############################################################
      #               🔴 PRODUCTION — ARGOCD GITOPS                 #
      ###############################################################
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Production — Sync ArgoCD App
        if: ${{ env.BRANCH_NAME == 'prod' || env.BRANCH_NAME == 'main' }}
        run: |
          echo "Deploying to Production via ArgoCD..."
      
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --username ${{ secrets.ARGOCD_USERNAME }} \
            --password ${{ secrets.ARGOCD_PASSWORD }} \
            --insecure
      
          argocd app sync url-shortener
          argocd app wait url-shortener


